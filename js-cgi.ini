# js-cgi configuration

# Maximum memory a script can use (supports K, M, G suffixes)
memory_limit = 128M

# Maximum execution time in seconds
max_execution_time = 30

# Show errors in browser (On) or hide them (Off)
display_errors = On

# Log errors to file
# error_log = /var/log/js-cgi/error.log

# Maximum upload file size (supports K, M, G suffixes)
upload_max_filesize = 2M

# Directory for temporary upload files
upload_dir = /tmp

# Directory where extensions are loaded from
extension_dir = /usr/lib/js-cgi/modules

# Load extensions
extension = session.so
extension = sqlite.so
extension = file.so
extension = crypto.so
extension = http.so
extension = mysql.so
extension = smtp.so
